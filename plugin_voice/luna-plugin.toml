name = "plugin-voice"
shown_name = "Voice"
version = "0.3.0"
description = "Voice conversations that know who is speaking — owner voice imprint, personality-matched voice and fillers, ElevenLabs audio, Luna stays the brain."
entry = "plugin_voice"
sdk_version = "0"
license = "MIT"
tags = ["voice", "talk", "elevenlabs", "interface"]
readme = """
# plugin-voice

Talk with your agent by voice — and it knows who's talking. plugin-voice adds a
sidebar voice widget (live waveforms for you and the agent), with audio carried
by ElevenLabs Agents while **your agent's own loop stays the brain** through an
OpenAI-compatible bridge this plugin serves.

Beyond plugin-talk, this plugin adds:
- **Owner voice imprint**: record a few phrases in Settings; the plugin builds a
  voice profile and flags whether the current speaker is you.
- **Personality-matched setup**: on connect, the agent itself chooses its
  greeting (with its real name), its "thinking" filler phrases, and the
  ElevenLabs voice that best fits its personality.

Requires plugin-vault. Audio flows browser ⇄ ElevenLabs; the imprint check runs
on lightweight spectral features on your Luna, never leaving it.

Source: https://github.com/huemorgan/plugin-voice
"""

[requires]
tools = 2
depends_on = ["plugin-vault"]

[[tools]]
name = "voice_status"
description = "Status of the voice setup: key availability (own/vault/gateway/env), agent provisioned, imprint ready."
policy = "auto_approve"
risk_level = "low"

[[tools]]
name = "voice_connect"
description = "Complete the voice setup with whatever ElevenLabs/11labs key is available; provisions the personality-matched voice agent."
policy = "ask"
risk_level = "medium"
